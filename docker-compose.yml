services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: bookshelf
      POSTGRES_PASSWORD: bookshelf
      POSTGRES_DB: bookshelf_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  web:
    build: .
    command: ./scripts/start-dev.sh
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - node_modules:/app/Bookshelf/node_modules
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - CHOKIDAR_USEPOLLING=true
      - ConnectionStrings__DefaultConnection=Host=db;Database=bookshelf_dev;Username=bookshelf;Password=bookshelf
    depends_on:
      - db

volumes:
  pgdata:
  node_modules:
